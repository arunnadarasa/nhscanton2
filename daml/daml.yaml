# Build with the Canton 3.x toolchain: `dpm build`
# (The legacy `daml` Assistant is deprecated in 3.4 and removed in 3.5.)
sdk-version: 3.5.1
name: nhs-budget-app-v2
source: .
version: 1.0.2
dependencies:
  - daml-prim
  - daml-stdlib
# USDCx (wrapped USDC) — DevNet xReserve programme.
# We ship a self-contained mock-usdcx package alongside this one so the
# atomic SettleAndCountersign flow works on any Canton participant
# (including the Seaport hackathon validator, where real xReserve is NOT
# deployed). Build mock-usdcx first:
#     cd daml/mock-usdcx && dpm build
# Then keep the data-dependency below uncommented. To swap in REAL xReserve
# USDCx on Canton DevNet, replace the path with the published DAR from
# https://github.com/digital-asset/xreserve-deposits/releases and update
# the import in Nhs.daml from `MockUsdcx` to `Usdcx`.
data-dependencies:
  - mock-usdcx/.daml/dist/mock-usdcx-1.0.0.dar
parties:
  - DHSC
  - NHSEngland
  - Auditor
