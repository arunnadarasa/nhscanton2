# Canton 3.4 single-process topology: one sequencer + one mediator + one
# participant, all in-memory. Schema based on the upstream
# examples/01-simple-topology and examples/09-json-api configs shipped in
# canton-open-source-3.4.8.tar.gz.
#
# Auth: trusts JWTs signed by Lovable Cloud (Supabase). The JWKS URL is
# substituted at deploy time by scripts/deploy-canton-fly.sh.
#
# Exposes:
#   - gRPC Ledger API on :5011 (RS256/ES256 JWT auth via JWKS)
#   - gRPC Admin API on :5012
#   - HTTP JSON Ledger API v2 on :7575

canton {
  parameters.non-standard-config = yes
  features.enable-preview-commands = yes

  sequencers {
    sequencer1 {
      storage.type = memory
      public-api.port = 5001
      admin-api.port = 5002
      public-api.address = "0.0.0.0"
      admin-api.address = "0.0.0.0"
      sequencer.type = BFT
    }
  }

  mediators {
    mediator1 {
      storage.type = memory
      admin-api.port = 5003
      admin-api.address = "0.0.0.0"
    }
  }

  participants {
    participant1 {
      storage.type = memory

      admin-api {
        address = "0.0.0.0"
        port = 5012
      }

      ledger-api {
        address = "0.0.0.0"
        port = 5011
        auth-services = [
          {
            type = jwt-rs-256-crt
            certificate = "/canton/config/jwt-public.crt"
            target-audience = "canton-ledger-api"
          }
        ]
        admin-token-config.admin-claim = true
      }

      http-ledger-api {
        address = "0.0.0.0"
        port = 7575
      }
    }
  }
}
